# Release workflow for Miqāt — builds Windows + macOS + Linux in
# parallel and publishes all artifacts to a single GitHub Release.
# Triggered by pushing a `v*.*.*` tag, or via "Run workflow" in the
# Actions UI.
#
# Version source of truth is `electron/package.json`. Bump it (use
# `npm run release:bump`), tag the matching vX.Y.Z, push the tag —
# the workflow handles the rest. electron-builder's GitHub provider
# creates the release on the first job to finish and the others
# append their artifacts to the same release.
#
# macOS builds are unsigned for now (no Apple Developer account).
# Users see a Gatekeeper warning on first launch — workaround
# documented in the README. Once we have a Developer ID we'll add
# `CSC_LINK` + `CSC_KEY_PASSWORD` secrets and the build will sign
# + notarize automatically.

name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.2) — must already exist'
        required: true
        type: string

# One release at a time per ref. Don't cancel in-progress; let it
# finish so partial artifacts don't end up half-uploaded.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      # Don't kill the other platforms if one fails — better to ship
      # the two that work and fix the third than to ship nothing.
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_dispatch passes a tag; tag-push provides the ref directly.
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Linux packaging deps
        # electron-builder shells out to `fakeroot` + `dpkg-deb` for the
        # .deb target. fakeroot isn't on ubuntu-latest by default, so the
        # deb step silently no-ops without it (AppImage still builds).
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fakeroot dpkg

      - name: Build all workspaces
        run: npm run build

      - name: Package + publish
        # electron-builder picks the right target from build.{win,mac,linux}
        # automatically based on the host OS. Each runner produces its own
        # platform's artifacts and uploads them to the GitHub Release.
        env:
          # electron-builder reads GH_TOKEN, not GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Upload build artifact (debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: miqaat-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            electron/dist-build/*.zip
            electron/dist-build/*.dmg
            electron/dist-build/*.AppImage
            electron/dist-build/*.deb
            electron/dist-build/latest*.yml
            electron/dist-build/*.blockmap
          retention-days: 7
          if-no-files-found: warn

  revalidate-landing:
    # Tells the landing site (miqaaat.com / miqaat.develop-better-solutions.com)
    # to drop its ISR cache and refetch the GitHub Releases API right
    # now — without this, visitors wait up to 10 minutes after a release
    # for the new download URLs to appear. Skipped if the secrets aren't
    # set, so a fresh fork doesn't fail this step.
    name: Refresh landing cache
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: POST to landing /api/revalidate
        env:
          URL: ${{ secrets.LANDING_REVALIDATE_URL }}
          SECRET: ${{ secrets.LANDING_REVALIDATE_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::notice::LANDING_REVALIDATE_URL or LANDING_REVALIDATE_SECRET not set — skipping cache refresh"
            exit 0
          fi
          # Failure is non-fatal — the release is already published; the
          # landing will catch up on its own within the ISR window.
          curl -fsSL --max-time 15 -X POST "$URL?secret=$SECRET" \
            && echo "Landing cache refreshed" \
            || echo "::warning::Landing revalidation failed (non-fatal)"
